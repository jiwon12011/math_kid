<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>수리수리 도감 — 사칙연산 마법 학습</title>
<meta name="description" content="덧셈·뺄셈·곱셈·나눗셈을 맞히면 흑백 동물 그림이 마법처럼 색이 살아나 도감이 채워지는 아이들 학습 앱" />
<meta name="theme-color" content="#f6c544" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="assets/img/ui/icon-magic-wand.webp" />
<link rel="preload" href="assets/fonts/himelody-latin.woff2" as="font" type="font/woff2" crossorigin />
<link rel="preload" href="assets/fonts/himelody-korean.woff2" as="font" type="font/woff2" crossorigin />
<link rel="preload" href="assets/fonts/jua-korean.woff2" as="font" type="font/woff2" crossorigin />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="app">

  <!-- ===== 놀기 ===== -->
  <section class="view active" id="view-play">
    <!-- 범위 선택 -->
    <div class="play-range" id="play-range" style="display:flex; flex-direction:column; min-height:0; flex:1;">
      <header class="topbar">
        <img class="magic" src="assets/img/ui/icon-magic-wand.webp" alt="" />
        <h1>수리수리 도감</h1>
      </header>
      <div class="scroll">
        <div class="range-intro">
          <div class="title">어떤 문제로 놀까?</div>
          <div class="sub">종류를 고르고 시작해요 (여러 개 OK)</div>
        </div>
        <div class="stamp-strip" id="stamp-strip"></div>
        <div id="weak-banner"></div>
        <div id="resume-hint"></div>
        <div class="op-grid" id="op-grid"></div>
        <div class="dan-section" id="dan-section">
          <div class="label">✖️ 곱셈은 몇 단으로 놀까?</div>
          <div class="dan-grid" id="dan-grid"></div>
          <div class="quick-row">
            <button class="btn" id="pick-all">전체 단</button>
            <button class="btn" id="pick-clear">단 지우기</button>
          </div>
        </div>
      </div>
      <div style="padding:10px 16px calc(14px + env(safe-area-inset-bottom));">
        <button class="btn primary big" id="start-quiz">▶ 시작하기</button>
      </div>
    </div>

    <!-- 퀴즈 -->
    <div class="quiz" id="play-quiz" style="display:none;">
      <div class="quiz-head">
        <button class="iconbtn" id="quiz-back" aria-label="뒤로"><img src="assets/img/ui/icon-back.webp" alt="" /></button>
        <div class="progress-wrap">
          <div class="progress-label"><span id="prog-text">0 / 12</span><span id="prog-animal"></span></div>
          <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
        </div>
      </div>
      <div class="question-board">
        <button class="speak-btn" id="q-speak" aria-label="문제 다시 듣기">🔈</button>
        <div class="q" id="q-text">7 × 8</div>
      </div>
      <div class="combo-banner" id="combo-banner"></div>
      <div class="viz" id="viz" aria-live="polite"></div>
      <div class="quiz-mid">
        <div class="canvas-wrap">
          <div class="canvas-inner" id="canvas-inner"></div>
          <div class="mascot" id="mascot"><img id="mascot-img" src="assets/img/emoji/mascot-fox.webp" alt="여우 친구" /></div>
        </div>
        <div class="choices" id="choices"></div>
      </div>
      <div class="coach" id="coach">정답을 골라봐!</div>
    </div>

    <!-- 완성 축하 -->
    <div class="modal-back" id="reward-modal">
      <div class="modal">
        <img class="reward-img" id="reward-img" src="" alt="" />
        <p class="reward-title">✨ 마수리 완성! ✨</p>
        <p class="reward-name" id="reward-name"></p>
        <p class="reward-rarity" id="reward-rarity"></p>
        <button class="btn primary big" id="reward-next" style="margin-top:8px;">다음 그림 그리기</button>
        <button class="btn" id="reward-dex" style="width:100%; margin-top:10px;">도감에서 보기</button>
      </div>
    </div>
  </section>

  <!-- ===== 도감 ===== -->
  <section class="view" id="view-dex">
    <header class="topbar">
      <h1>📖 나의 도감</h1>
      <div class="spacer"></div>
      <div style="font-family:var(--font-hand); font-size:20px;" id="dex-total">0 / 50</div>
    </header>
    <div class="scroll" id="dex-scroll"></div>
  </section>

  <!-- ===== 설정 ===== -->
  <section class="view" id="view-settings">
    <header class="topbar"><h1>⚙️ 설정</h1></header>
    <div class="scroll" id="settings-scroll">
      <!-- 아이용: 소리 -->
      <div class="setting-row">
        <img class="ic" src="assets/img/ui/icon-sound.webp" alt="" />
        <span class="lab">소리</span>
        <button class="switch" id="sw-sound" role="switch" aria-checked="true" aria-label="소리 켜기끄기"></button>
      </div>
      <div class="setting-row">
        <span class="ic">🎵</span>
        <span class="lab">배경 음악</span>
        <button class="switch" id="sw-music" role="switch" aria-checked="true" aria-label="배경 음악 켜기끄기"></button>
      </div>
      <div class="setting-row">
        <span class="ic">🗣️</span>
        <span class="lab">음성 안내</span>
        <button class="switch" id="sw-voice" role="switch" aria-checked="true" aria-label="음성 안내 켜기끄기"></button>
      </div>
      <div class="setting-row slider-row">
        <span class="ic">🔉</span>
        <span class="lab">효과음 음량</span>
        <input type="range" class="vol" id="vol-sfx" min="0" max="100" step="5" aria-label="효과음 음량" />
      </div>
      <div class="setting-row slider-row">
        <span class="ic">🎚️</span>
        <span class="lab">음악 음량</span>
        <input type="range" class="vol" id="vol-music" min="0" max="100" step="5" aria-label="배경 음악 음량" />
      </div>
      <div class="setting-row">
        <span class="ic">🎼</span>
        <span class="lab">음악 곡</span>
        <div class="seg" id="seg-track"></div>
      </div>

      <!-- 부모 영역 (게이트 뒤) -->
      <div id="parent-locked">
        <div class="setting-row locked" id="open-parent" role="button" tabindex="0">
          <img class="ic" src="assets/img/ui/icon-parent-lock.webp" alt="" />
          <span class="lab">부모님 메뉴</span>
          <span class="lock">🔒 기록 · 난이도</span>
        </div>
      </div>

      <div id="parent-area" style="display:none;">
        <div class="setting-row">
          <span class="ic">💡</span>
          <span class="lab">힌트 그림</span>
          <button class="switch" id="sw-hint" role="switch" aria-checked="true" aria-label="힌트 그림 켜기끄기"></button>
        </div>
        <div class="setting-row">
          <img class="ic" src="assets/img/ui/icon-settings.webp" alt="" />
          <span class="lab">학습 난이도</span>
          <div class="seg" id="seg-diff">
            <button data-d="easy">쉬움</button>
            <button data-d="normal">보통</button>
            <button data-d="hard">어려움</button>
          </div>
        </div>
        <h3 style="font-family:var(--font-hand); margin:18px 2px 10px;">📊 학습 기록</h3>
        <div class="stat-grid">
          <div class="stat"><div class="v" id="st-correct">0</div><div class="k">맞힌 문제</div></div>
          <div class="stat"><div class="v" id="st-acc">0%</div><div class="k">정답률</div></div>
          <div class="stat"><div class="v" id="st-dex">0</div><div class="k">모은 동물</div></div>
          <div class="stat"><div class="v" id="st-streak">0</div><div class="k">최고 연속</div></div>
        </div>
        <h4 style="font-family:var(--font-hand); margin:18px 2px 8px;">단별 정답률</h4>
        <div id="dan-stats"></div>
        <button class="btn" id="reset-all" style="width:100%; margin:18px 0; color:var(--oops);">기록 초기화</button>
      </div>
    </div>

    <!-- 부모 게이트 모달 -->
    <div class="modal-back" id="gate-modal">
      <div class="modal">
        <p class="reward-title">🔒 보호자 확인</p>
        <div class="gate">
          <div class="sub" style="color:var(--ink-soft)">보호자님, 아래 덧셈을 풀어 주세요</div>
          <div class="q" id="gate-q">37 + 58</div>
          <div class="gate-input" id="gate-input">?</div>
          <div class="keypad" id="gate-keys"></div>
          <button class="btn" id="gate-cancel" style="width:100%; margin-top:14px;">취소</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== 하단 네비 ===== -->
  <nav class="nav">
    <button data-view="play" aria-current="page"><img class="ni-img" src="assets/img/emoji/nav-play-crayon.webp" alt="" />놀기</button>
    <button data-view="dex"><img class="ni-img" src="assets/img/emoji/nav-dex-book.webp" alt="" />도감</button>
    <button data-view="settings"><img class="ni-img" src="assets/img/emoji/nav-settings-gear.webp" alt="" />설정</button>
  </nav>

</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
